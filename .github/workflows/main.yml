name: APK_URETICI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Cek
        uses: actions/checkout@v3

      - name: Buildozer ile APK Yap
        uses: kivy/buildozer-action@master
        with:
          workdir: .
          buildozer_version: stable

      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Hazir-Payload-APK
          path: bin/*.apk
